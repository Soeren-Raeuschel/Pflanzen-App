        TestRunner.log('[Groq v2] normalizeGroqResponse _source=groq', norm._source === 'groq');

        // Reparatur
        const brokenResp = { name:'Kaktus', water:'Alle 21 Tage', fertilizer_interval: null, light:null, humidity:null, temperature:null };
        const repaired = repairPartialResponse(brokenResp, 'Kaktus');
        TestRunner.log('[Groq v2] repairPartialResponse füllt watering_days', !!repaired.watering_days);
        TestRunner.log('[Groq v2] repairPartialResponse füllt light', !!repaired.light);
        TestRunner.log('[Groq v2] repairPartialResponse _repaired=true', repaired._repaired === true);

        // Persistenter Cache
        const testSeason = 'TestSaison';
        setCachedPlantAiData('TestPflanze', testSeason, { watering_days: 5, water: 'Test' });
        const cacheHit = getCachedPlantAiData('TestPflanze', testSeason);
        TestRunner.log('[Groq v2] Persistenter Cache schreiben+lesen', cacheHit?.watering_days === 5);
        TestRunner.log('[Groq v2] Cache enthält _fromCache Flag', cacheHit?._fromCache === true);

        // Normalisierung enthält description/origin/tip
        const enrichedResp = { ...validResp, description: 'Eine schöne Pflanze mit tollen Blättern.', origin: 'Tropische Regenwälder Südamerikas', tip: 'Staunässe vermeiden und regelmäßig Blätter abwischen.' };
        const enrichNorm = normalizeGroqResponse(enrichedResp, 'Monstera', 'Sommer');
        TestRunner.log('[Enrich] normalizeGroqResponse extrahiert description', !!enrichNorm.description);
        TestRunner.log('[Enrich] normalizeGroqResponse extrahiert origin', !!enrichNorm.origin);
        TestRunner.log('[Enrich] normalizeGroqResponse extrahiert tip', !!enrichNorm.tip);
        TestRunner.log('[Enrich] normalizeGroqResponse _enriched=true', enrichNorm._enriched === true);

        // repairPartialResponse füllt description/origin/tip aus PLANT_DB
        const unEnrichedResp = { name:'Monstera', water:'Alle 9 Tage', fertilizer_interval:21, light:'Hell', humidity:'Hoch', temperature:'20°C' };
        const repairedEnrich = repairPartialResponse(unEnrichedResp, 'Monstera');
        TestRunner.log('[Enrich] repairPartialResponse füllt description aus PLANT_DB', !!repairedEnrich.description);
        TestRunner.log('[Enrich] repairPartialResponse füllt origin aus PLANT_DB', !!repairedEnrich.origin);
        TestRunner.log('[Enrich] repairPartialResponse füllt tip aus PLANT_DB', !!repairedEnrich.tip);

        // validateEnrichResponse
        const goodEnrich = { description: 'Schöne tropische Pflanze mit großen Blättern.', origin: 'Tropische Wälder Brasiliens', tip: 'Staunässe vermeiden, regelmäßig gießen.' };
        const goodEnrichV = validateEnrichResponse(goodEnrich);
        TestRunner.log('[Enrich] validateEnrichResponse akzeptiert gute Daten', goodEnrichV.valid);
        const badEnrich = { description: 'X', origin: '', tip: 'Y' };
        const badEnrichV = validateEnrichResponse(badEnrich);
        TestRunner.log('[Enrich] validateEnrichResponse erkennt schlechte Daten', !badEnrichV.valid && badEnrichV.errors.length >= 2);

        // hasEnrichData
        const plantWithEnrich  = { aiData: { description: 'Beschreibung', origin: 'Herkunft', tip: 'Tipp' } };
        const plantWithoutEnrich = { aiData: { light: 'Hell', water: 'Alle 7 Tage' } };
        TestRunner.log('[Enrich] hasEnrichData erkennt vollständige Daten', hasEnrichData(plantWithEnrich));
        TestRunner.log('[Enrich] hasEnrichData erkennt fehlende Daten', !hasEnrichData(plantWithoutEnrich));

        // Enrich-Cache
        setCachedEnrichData('TestPflanzeEnrich', { description: 'Test-Beschreibung', origin: 'Test-Herkunft', tip: 'Test-Tipp' });
        const enrichCacheHit = getCachedEnrichData('TestPflanzeEnrich');
        TestRunner.log('[Enrich] Enrich-Cache schreiben+lesen', enrichCacheHit?.description === 'Test-Beschreibung');
        TestRunner.log('[Enrich] Enrich-Cache setzt _fromEnrichCache', enrichCacheHit?._fromEnrichCache === true);

        // Migration: aiData enthält jetzt description/origin/tip aus PLANT_DB
        const migratedWithEnrich = {
          ...PLANT_DB['Monstera'],
          description: PLANT_DB['Monstera'].description || null,
          origin: PLANT_DB['Monstera'].origin || null,
          tip: PLANT_DB['Monstera'].tip || null
        };
        TestRunner.log('[Enrich] Migration befüllt description', !!migratedWithEnrich.description);
        TestRunner.log('[Enrich] Migration befüllt origin', !!migratedWithEnrich.origin);
      } catch(e) { console.error('Test error:', e); }
      return TestRunner.summary();
    }
    window.runTests = runAllTests;
    console.log('✅ Tests verfügbar: runTests() eingeben\n');
  })();
  </script>
