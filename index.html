  <script>
  const { useState, useEffect, useCallback } = React;

  const PLANT_DB = {
    "Monstera":     { icon: "🌿", watering_interval: 9,  light: "Hell, indirekt",   tip: "Die Erde sollte zwischendurch gut antrocknen. Staunässe unbedingt vermeiden.", humidity: "Hoch",    difficulty: "Einfach", description: "Bekannt für ihre großen, gefensterten Blätter.", origin: "Zentral- und Südamerika" },
    "Pothos":       { icon: "💚", watering_interval: 10, light: "Wenig bis indirekt", tip: "Sehr anpassungsfähig. Verzeiht es, wenn das Gießen mal vergessen wird.", humidity: "Mittel",  difficulty: "Sehr einfach", description: "Eine kletternde oder hängende Pflanze mit herzförmigen Blättern.", origin: "Südostasien" },
    "Ficus":       { icon: "🌳", watering_interval: 7,  light: "Hell, indirekt",   tip: "Reagiert empfindlich auf Standortwechsel und Zugluft.", humidity: "Mittel",  difficulty: "Mittel", description: "Ein beliebter Zimmerbaum mit glänzenden Blättern.", origin: "Südostasien, Australien" },
    "Kaktus":       { icon: "🌵", watering_interval: 25, light: "Volle Sonne",      tip: "Im Winter fast gar nicht gießen. Benötigt mineralisches Substrat.", humidity: "Niedrig", difficulty: "Sehr einfach", description: "Wasserspeichernde Pflanze, perfekt für sonnige Plätze.", origin: "Amerika" },
    "Orchidee":     { icon: "🌸", watering_interval: 8,  light: "Hell, indirekt",   tip: "Am besten den Topf für 15 Min. in kalkarmes Wasser tauchen, dann abtropfen lassen.", humidity: "Hoch",    difficulty: "Anspruchsvoll", description: "Elegante Blütenpflanze mit speziellen Pflegeansprüchen.", origin: "Tropen weltweit" },
    "Aloe Vera":    { icon: "🌱", watering_interval: 18, light: "Direkte Sonne",    tip: "Gießen erst wenn das Substrat fast vollständig durchgetrocknet ist.", humidity: "Niedrig", difficulty: "Einfach", description: "Heilpflanze mit dickfleischigen, dornigen Blättern.", origin: "Arabische Halbinsel" },

    "Spuckpalme":   { icon: "🌺", watering_interval: 9,  light: "Hell, indirekt",   tip: "Vorsicht, der Milchsaft ist giftig und kann Hautreizungen verursachen.", humidity: "Mittel",  difficulty: "Einfach", description: "Interessante Pflanze, die ihre Samen meterweit verschießen kann.", origin: "Madagaskar" },

    "Friedenslilie": { icon: "百合", watering_interval: 6,  light: "Halbschatten",     tip: "Hängende Blätter sind ein klares Signal für Wassermangel.", humidity: "Hoch",    difficulty: "Einfach", description: "Elegante Pflanze mit weißen Hochblättern, die die Luft reinigt.", origin: "Tropen Amerikas und Südostasiens" },
    "Drachenbaum":  { icon: "🌿", watering_interval: 12, light: "Hell, indirekt",   tip: "Braucht wenig Wasser. Braune Spitzen deuten auf zu trockene Luft hin.", humidity: "Mittel",  difficulty: "Einfach", description: "Palmenähnliche Pflanze mit schmalen, spitzen Blättern.", origin: "Tropisches Afrika" },
    "Bogenhanf":    { icon: "🌱", watering_interval: 25, light: "Wenig bis sonnig",  tip: "Wohl die robusteste Zimmerpflanze. Lieber zu trocken als zu nass.", humidity: "Niedrig", difficulty: "Sehr einfach", description: "Nahezu unkaputtbare Pflanze mit aufrecht wachsenden Blättern.", origin: "Westafrika" },
    "Elefantenfuß": { icon: "🐘", watering_interval: 18, light: "Hell bis sonnig",   tip: "Speichert viel Wasser im Stamm. Staunässe führt schnell zu Fäulnis.", humidity: "Niedrig", difficulty: "Einfach", description: "Charakteristische Pflanze mit verdicktem Stammfuß.", origin: "Mexiko" },
    "Zamioculcas":  { icon: "💚", watering_interval: 18, light: "Wenig bis hell",   tip: "Je dunkler sie steht, desto weniger Wasser benötigt sie.", humidity: "Niedrig", difficulty: "Sehr einfach", description: "Wachsartig glänzende Blätter und extrem pflegeleicht.", origin: "Ostafrika" },
    "Tomate":       { icon: "🍅", watering_interval: 2,  light: "Volle Sonne",      tip: "Regelmäßig düngen und ausgeizen. Staunässe vermeiden.", humidity: "Mittel",  difficulty: "Mittel", description: "Beliebtes Gemüse mit roten, saftigen Früchten.", origin: "Südamerika" },
    "Paprika":      { icon: "🫑", watering_interval: 3,  light: "Volle Sonne",      tip: "Braucht Wärme und regelmäßiges Gießen. Dünger nicht vergessen.", humidity: "Mittel",  difficulty: "Mittel", description: "Farbenfrohes Gemüse in diversen Sorten.", origin: "Mittel- und Südamerika" },
    "Zitrone":      { icon: "🍋", watering_interval: 5,  light: "Volle Sonne",      tip: "Kalkarmes Wasser bevorzugt. Im Winter kühler stellen.", humidity: "Mittel",  difficulty: "Mittel", description: "Zitruspflanze mit sauren Früchten.", origin: "Südasien" },
    "Olivenbaum":   { icon: "🌿", watering_interval: 14, light: "Volle Sonne",      tip: "Trockenresistent. Nicht überwässern, Staunässe vermeiden.", humidity: "Niedrig", difficulty: "Einfach", description: "Mediterraner Baum mit silbrigen Blättern.", origin: "Mittelmeerraum" },
    "Filzige":      { icon: "🍃", watering_interval: 7,  light: "Hell, indirekt",   tip: "Luftfeuchtigkeit wichtig. Regelmäßig besprühen.", humidity: "Hoch",  difficulty: "Mittel", description: "Tropische Pflanze mit samtigen Blättern.", origin: "Südamerika" },
    "Andere":       { icon: "🌱", watering_interval: 7, light: "Indirekt",         tip: "Beobachte deine Pflanze genau und passe die Pflege entsprechend an.", humidity: "Mittel",  difficulty: "Mittel", description: "Individuelle Pflege für deine besondere Pflanze.", origin: "Unbekannt" },
  };

  // Synonym database for plant matching
  const PLANT_SYNONYMS = {
    "Monstera": ["monstera", "monstera deliciosa", "swiss cheese plant", "fensterblatt", "gridelfisch"],
    "Pothos": ["pothos", "epipremnum", "teufelsivy", "goldranke", "scindapsus"],
    "Ficus": ["ficus", "ficus benjamina", "gummibaum", "ficus elastica", "ficus lyrata"],
    "Kaktus": ["kaktus", "cactus", "sukkulente", "kakte"],
    "Orchidee": ["orchidee", "orchid", "phalenopsis", "phaläne"],
    "Aloe Vera": ["aloe", "aloe vera", "aloe vera", "echte aloe"],
    "Lavendel": ["lavendel", "lavender", "echter lavendel"],
    "Basilikum": ["basilikum", "basil", "ocimum", "echtes basilikum"],
    "Palme": ["palme", "palm", "palma", "kentia", "areca", "date palm"],
    "Sukkulente": ["sukkulente", "succulent", "dickblatt"],
    "Efeu": ["efeu", "ivy", "hedera", "gemeiner efeu"],
    "Bonsai": ["bonsai", "bonsai baum"],
    "Rose": ["rose", "rosen", "rosaceae"],
    "Spuckpalme": ["spuckpalme", "sperrblume", "streptocarpus"],
    "Gummibaum": ["gummibaum", "gummibaum", "ficus elastica", "rubber plant"],
    "Thymian": ["thymian", "thyme", "echter thymian"],
    "Minze": ["minze", "mint", "pfefferminze", "spearmint"],
    "Friedenslilie": ["friedenslilie", "peace lily", "spathiphyllum"],
    "Drachenbaum": ["drachenbaum", "dracaena", "dragon tree"],
    "Bogenhanf": ["bogenhanf", "sansevieria", "schwiegermutterzunge", "snake plant"],
    "Elefantenfuß": ["elefantenfuß", "elephant foot", "beaucarnea", "nolina"],
    "Zamioculcas": ["zamioculcas", "zz plant", "zamioculcas zamiifolia"],
    "Tomate": ["tomate", "tomato", "tomaten"],
    "Paprika": ["paprika", "pepper", "chili", "capsicum"],
    "Zitrone": ["zitrone", "lemon", "citrus", "limone"],
    "Olivenbaum": ["olivenbaum", "olive tree", "olea"],
  };

  // Category fallback profiles with safe defaults
  const CATEGORY_DEFAULTS = {
    "succulent": { watering: 14, fertilizer: 30, light: "Direkte Sonne", humidity: "Niedrig", category: "Sukkulente" },
    "tropical": { watering: 5, fertilizer: 14, light: "Hell, indirekt", humidity: "Hoch", category: "Tropisch" },
    "herb": { watering: 3, fertilizer: 21, light: "Volle Sonne", humidity: "Mittel", category: "Kräuter" },
    "vegetable": { watering: 2, fertilizer: 14, light: "Volle Sonne", humidity: "Mittel", category: "Gemüse" },
    "tree": { watering: 7, fertilizer: 30, light: "Hell", humidity: "Mittel", category: "Baum" },
    "fern": { watering: 4, fertilizer: 21, light: "Halbschatten", humidity: "Hoch", category: "Farn" },
    "cactus": { watering: 21, fertilizer: 60, light: "Volle Sonne", humidity: "Niedrig", category: "Kaktus" },
    "flowering": { watering: 5, fertilizer: 14, light: "Hell, indirekt", humidity: "Mittel", category: "Blühend" },
    "foliage": { watering: 7, fertilizer: 21, light: "Indirekt", humidity: "Mittel", category: "Blattschmuck" },
    "unknown": { watering: 7, fertilizer: 21, light: "Hell, indirekt", humidity: "Mittel", category: "Unbekannt" }
  };

  // Input normalization
  function normalizeInput(str) {
    if (!str || typeof str !== 'string') return '';
    return str
      .toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // Remove diacritics
      .replace(/[^a-z0-9\s]/g, '') // Remove special chars
      .replace(/\s+/g, ' ') // Normalize whitespace
      .trim();
  }

  // Levenshtein distance for fuzzy matching
  function levenshteinDistance(a, b) {
    if (!a || !b) return Math.max((a || '').length, (b || '').length);
    const matrix = [];
    for (let i = 0; i <= b.length; i++) matrix[i] = [i];
    for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
    for (let i = 1; i <= b.length; i++) {
      for (let j = 1; j <= a.length; j++) {
        if (b.charAt(i-1) === a.charAt(j-1)) {
          matrix[i][j] = matrix[i-1][j-1];
        } else {
          matrix[i][j] = Math.min(
            matrix[i-1][j-1] + 1,
            matrix[i][j-1] + 1,
            matrix[i-1][j] + 1
          );
        }
      }
    }
    return matrix[b.length][a.length];
  }

  // Calculate similarity ratio (0-1)
  function getSimilarity(a, b) {
    const normA = normalizeInput(a);
    const normB = normalizeInput(b);
    if (normA === normB) return 1;
    const maxLen = Math.max(normA.length, normB.length);
    if (maxLen === 0) return 0;
    return 1 - levenshteinDistance(normA, normB) / maxLen;
  }

  // Robust plant matching with multiple strategies
  function matchPlant(input) {
    const normalized = normalizeInput(input);
    if (!normalized || normalized.length < 2) return null;

    // Strategy 1: Exact match in PLANT_DB
    if (PLANT_DB[normalized.charAt(0).toUpperCase() + normalized.slice(1)]) {
      return { type: normalized.charAt(0).toUpperCase() + normalized.slice(1), confidence: 1.0, strategy: 'exact' };
    }

    // Strategy 2: Exact match in synonyms
    for (const [mainName, synonyms] of Object.entries(PLANT_SYNONYMS)) {
      if (synonyms.includes(normalized) || normalized.includes(mainName.toLowerCase())) {
        return { type: mainName, confidence: 0.95, strategy: 'synonym' };
      }
    }

    // Strategy 3: Fuzzy match (similarity > 0.6)
    let bestMatch = null;
    let bestScore = 0.6;
    
    for (const dbName of Object.keys(PLANT_DB)) {
      const score = getSimilarity(normalized, dbName);
      if (score > bestScore) {
        bestScore = score;
        bestMatch = dbName;
      }
      // Also check synonyms
      const synonyms = PLANT_SYNONYMS[dbName] || [];
      for (const syn of synonyms) {
        const synScore = getSimilarity(normalized, syn);
        if (synScore > bestScore) {
          bestScore = synScore;
          bestMatch = dbName;
        }
      }
    }
    
    if (bestMatch) {
      return { type: bestMatch, confidence: bestScore, strategy: 'fuzzy' };
    }

    // Strategy 4: Category-based matching based on keywords
    const keywords = {
      succulent: ['sukkulente', 'succulent', 'kaktus', 'cactus', 'aloe', 'agave', 'echeveria', 'sedum'],
      tropical: ['tropisch', 'tropical', 'monstera', 'palm', 'banane', 'farn', 'orchidee'],
      herb: ['kraut', 'herb', 'basilikum', 'thymian', 'rosmarin', 'salbei', 'minze', 'petersilie'],
      vegetable: ['gemüse', 'vegetable', 'tomate', 'paprika', 'gurke', 'salat'],
      tree: ['baum', 'tree', 'ficus', 'oliven', 'zitrone', 'avocado'],
      fern: ['farn', 'fern', 'blau'],
      flowering: ['blume', 'flower', 'rose', 'geranie', 'petunie'],
      cactus: ['kaktus', 'cactus', 'opuntia', 'echinocactus']
    };

    for (const [category, words] of Object.entries(keywords)) {
      for (const word of words) {
        if (normalized.includes(word)) {
          return { type: category, confidence: 0.5, strategy: 'category' };
        }
      }
    }

    // Strategy 5: Return null - fallback will handle this
    return null;
  }

  // Get fallback data based on category
  function getFallbackData(input, matchResult) {
    const fallback = CATEGORY_DEFAULTS[matchResult?.type] || CATEGORY_DEFAULTS['unknown'];
    const category = matchResult?.strategy || 'fallback';
    
    // BUGFIX: Verwende fallback.watering (nicht fallback.water – der Key in CATEGORY_DEFAULTS heißt "watering")
    const wateringDays = fallback.watering || 7;
    const fertilizerDays = fallback.fertilizer || 21;
    return {
      name: input,
      category: fallback.category,
      confidence: matchResult?.confidence || 0.1,
      strategy: category,
      fallback: true,
      water: `Alle ${wateringDays} Tage gießen`,
      light: fallback.light || "Hell, indirekt",
      humidity: fallback.humidity || "Mittel",
      temperature: "18-25°C",
      fertilizer_interval: fertilizerDays,
      fertilizer_type: (fallback.category === 'Sukkulente' || fallback.category === 'Kaktus') ? "Minimal düngen, nur in Wachstumsphase" : "Standard Dünger in Wachstumsphase",
      notes: getFallbackMessage(fallback.category, category)
    };
  }

  function getFallbackMessage(category, strategy) {
    const messages = {
      'Sukkulente': "Sukkulente speichern Wasser in ihren Blättern. Weniger gießen, Substrat zwischen den Gießgaben gut austrocknen lassen.",
      'Tropisch': "Tropische Pflanzen brauchen mehr Wasser und hohe Luftfeuchtigkeit. Regelmäßig besprühen.",
      'Kräuter': "Kräuter bevorzugen gleichmäßige Feuchtigkeit. Nicht austrocknen lassen.",
      'Gemüse': "Gemüsepflanzen brauchen viel Wasser und regelmäßige Nährstoffe. Kontinuierlich düngen.",
      'Baum': "Bäume brauchen tiefes Gießen. Erde zwischen den Gießgaben antrocknen lassen.",
      'Farn': "Farne lieben Feuchtigkeit und Schatten. Erde gleichmäßig feucht halten.",
      'Blühend': "Blühende Pflanzen brauchen mehr Energie. Regelmäßig düngen während der Blüte.",
      'Blattschmuck': "Zierpflanzen mit festen Blättern sind meist pflegeleicht. Normal gießen.",
      'Kaktus': "Kakteen brauchen sehr wenig Wasser. Nur gießen wenn Substrat komplett trocken.",
      'Unbekannt': "Pflegehinweise basieren auf allgemeinen Richtwerten. An die Pflanze anpassen."
    };
    
    let prefix = "";
    if (strategy === 'category') prefix = "Basierend auf Kategorie-Erkennung: ";
    else if (strategy === 'fallback') prefix = "Allgemeine Pflegerichtlinien: ";
    else prefix = "Annäherung an ähnliche Pflanze: ";
    
    return prefix + (messages[category] || messages['Unbekannt']);
  }

  // Enhanced findMatchingType with fallback messaging
  function findMatchingTypeWithFallback(plantName) {
    const result = matchPlant(plantName);
    if (result && result.strategy !== 'category') {
      return { type: result.type, confidence: result.confidence, strategy: result.strategy, fallback: false };
    }
    if (result && result.strategy === 'category') {
      const fallback = getFallbackData(plantName, result);
      return { type: "Andere", confidence: result.confidence, strategy: result.strategy, fallback: true, fallbackData: fallback };
    }
    // No match at all - use generic fallback
    const fallback = getFallbackData(plantName, { type: 'unknown', confidence: 0.1 });
    return { type: "Andere", confidence: 0.1, strategy: 'fallback', fallback: true, fallbackData: fallback };
  }

  function getPlantIcon(plantType) {
    return PLANT_DB[plantType]?.icon || "🌱";
  }

  // Get display name - use custom_name if available, otherwise fall back to name
  function getDisplayName(plant) {
    return plant?.custom_name || plant?.name || "Unbekannt";
  }

  const C_LIGHT = {
    bg: "#FAFBFC", 
    card: "#FFFFFF", 
    text: "#1A1A1A", 
    muted: "#9CA3AF",
    accent: "#10B981", 
    accentLight: "#D1FAE5",
    warn: "#F59E0B", 
    warnLight: "#FEF3C7", 
    border: "#E5E7EB",
    success: "#10B981",
    info: "#3B82F6",
    inverse: "#FFFFFF",
    inputBg: "#F9F9F9",
    navBg: "#FFFFFF",
    cardBorder: "1px solid #E5E7EB",
    warm: "#B77B00",
    warmLight: "#FEF3E2",
    warnBorder: "#f5d8cc",
    danger: "#DC2626",
    dangerLight: "#FEF2F2",

  const LOCATION_CACHE_KEY = 'pflanzen_location_cache';
  
  // Get cached weather data
  function getCachedWeather() {
    try {
      const cached = localStorage.getItem(WEATHER_CACHE_KEY);
      if (cached) {
        const data = JSON.parse(cached);
        if (data.timestamp && (Date.now() - data.timestamp < WEATHER_CACHE_DURATION)) {
          return data;
        }
      }
    } catch(e) {}
    return null;
  }
  
  // Save weather to cache
  function setCachedWeather(data) {

      }));
    } catch(e) {}
  }

  // BUGFIX P2: Separater Location-Cache – Geolocation max. 1x pro 24h anfragen
  function getCachedLocation() {
    try {
      const cached = localStorage.getItem(LOCATION_CACHE_KEY);
      if (cached) {
        const data = JSON.parse(cached);
        if (data.timestamp && (Date.now() - data.timestamp < WEATHER_CACHE_DURATION)) {
          return data; // { lat, lon, timestamp }
        }
      }
    } catch(e) {}
    return null;
  }

  function setCachedLocation(lat, lon) {
    try {

  }

  // Gibt zurück wie alt der letzte Standort-Abruf ist (in Minuten), oder null
  function getLocationCacheAge() {
    try {
      const cached = localStorage.getItem(LOCATION_CACHE_KEY);
      if (cached) {
        const data = JSON.parse(cached);
        if (data.timestamp) return Math.round((Date.now() - data.timestamp) / 60000);
      }
    } catch(e) {}
    return null;
  }
  
  async function fetchWeather(forceRefresh = false) {
    // BUGFIX P2: Bei forceRefresh werden beide Caches ignoriert
    if (!forceRefresh) {
      const cached = getCachedWeather();
      if (cached) {
        weatherData = cached;
        return weatherData;
      }
    }

    let lat, lon;

    // BUGFIX P2: Standort aus Cache lesen, falls vorhanden und < 24h alt
    const cachedLoc = forceRefresh ? null : getCachedLocation();
    if (cachedLoc) {
      lat = cachedLoc.lat;
      lon = cachedLoc.lon;
    } else {
      // Neuen Standort abfragen – nur wenn kein gültiger Cache vorhanden
      try {
        const position = await new Promise((resolve, reject) => {
          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 10000 });
          } else {
            reject(new Error("No geolocation"));
          }
        });
        lat = Math.max(-90, Math.min(90, position.coords.latitude));
        lon = Math.max(-180, Math.min(180, position.coords.longitude));
        setCachedLocation(lat, lon); // Standort für 24h cachen
      } catch(e) {
        // Fallback: Berlin als Standardstandort
        lat = 52.52;
        lon = 13.41;
        setCachedLocation(lat, lon);
      }
    }

    try {
      const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m&timezone=auto`);
      if (response.ok) {
        const data = await response.json();
        if (data.current) {
          weatherData = {
            temp: Math.round(data.current.temperature_2m),
            humidity: Math.round(data.current.relative_humidity_2m),
            lat: lat,
            lon: lon,
            updated: new Date().toISOString()
          };
          setCachedWeather(weatherData);
          return weatherData;
        }
      }
    } catch(e2) {}
    return null;
  }

  function analyzeRoomConditions(plant, room) {
    const issues = [];
    const plantInfo = PLANT_DB[plant.type] || {};
    const aiData = plant.aiData || {};
    
    if (!room) return issues;
    
    if (room.temperature && aiData.temperature) {
      const tempMatch = aiData.temperature.match(/(\d+)\s*[-–]\s*(\d+)/);
      if (tempMatch) {
        const minTemp = parseInt(tempMatch[1]);
        const maxTemp = parseInt(tempMatch[2]);
        if (room.temperature < minTemp || room.temperature > maxTemp) {
          issues.push(`Temperatur ${room.temperature}°C außerhalb Optimalbereich (${aiData.temperature})`);
        }
      }
    }
    
    if (room.humidity && aiData.humidity) {
      const hum = aiData.humidity.toLowerCase();
      if (hum.includes("hoch") && room.humidity < 60) {
        issues.push(`Luftfeuchtigkeit zu niedrig (${room.humidity}%). Pflanze braucht hohe Luftfeuchtigkeit.`);
      } else if (hum.includes("niedrig") && room.humidity > 40) {
        issues.push(`Luftfeuchtigkeit zu hoch (${room.humidity}%). Pflanze bevorzugt trockene Luft.`);
      }
    }
    
    if (room.id === "balkon" || room.id === "garten") {
      if (aiData.light?.includes("indirekt") || aiData.light?.includes("Halbschatten")) {
        issues.push("Pflanze preferiert indirektes Licht, direkte Sonne am Balkon könnte schaden.");
      }
    }
    
    return issues;
  }

  function daysSince(d) {
    if (!d) return null;
    try {
      const date = new Date(d);
      if (isNaN(date.getTime())) return null;
      return Math.floor((Date.now() - date.getTime()) / MS_PER_DAY);
    } catch { return null; }
  }
  function needsWater(p) {
    if (!p || !p.type) return false;
    const d = daysSince(p.last_watered_date);
    if (d === null) return true;
    const interval = p.watering_interval || PLANT_DB[p.type]?.watering_interval || 7;
    return d >= Math.max(1, interval);
  }
  function daysUntil(p) {
    if (!p || !p.type) return 0;
    const d = daysSince(p.last_watered_date);
    if (d === null) return 0;
    const interval = p.watering_interval || PLANT_DB[p.type]?.watering_interval || 7;
    return Math.max(0, Math.max(1, interval) - d);
  }
  function needsFertilizer(p) {
    if (!p || !p.fertilizer_interval || p.fertilizer_interval === 0) return false;
    const d = daysSince(p.last_fertilized_date);
    if (d === null) return true;
    return d >= p.fertilizer_interval;
  }
  function daysUntilFertilizer(p) {
    if (!p || !p.fertilizer_interval || p.fertilizer_interval === 0) return null;
    const d = daysSince(p.last_fertilized_date);
    if (d === null) return 0;
    return Math.max(0, p.fertilizer_interval - d);
  }

  function getCurrentSeason() {
    const month = new Date().getMonth() + 1;
    if (month >= 3 && month <= 5) return "spring";
    if (month >= 6 && month <= 8) return "summer";
    if (month >= 9 && month <= 11) return "autumn";
    return "winter";
  }

  function getSeasonName(season) {
    const names = { spring: "Frühling", summer: "Sommer", autumn: "Herbst", winter: "Winter" };
    return names[season] || "Unbekannt";
  }

  function getPlantCategory(type) {
    const categories = {
      succulent: ["Kaktus", "Sukkulente", "Aloe Vera", "Bogenhanf", "Zamioculcas", "Elefantenfuß"],
      tropical: ["Monstera", "Orchidee", "Friedenslilie", "Drachenbaum", "Filzige", "Spuckpalme"],
      herb: ["Basilikum", "Minze", "Thymian", "Lavendel"],
      vegetable: ["Tomate", "Paprika", "Zitrone"],
      tree: ["Ficus", "Palme", "Olivenbaum", "Bonsai", "Rose"],
      vine: ["Pothos", "Efeu"],
      other: ["Andere"]
    };
    for (const [cat, types] of Object.entries(categories)) {
      if (types.includes(type)) return cat;
    }
    return "other";
  }

  function getBaseWateringInterval(plantType) {
    const cat = getPlantCategory(plantType);
    if (cat === "succulent") return 14;
    if (cat === "tropical") return 5;
    if (cat === "herb") return 3;
    if (cat === "vegetable") return 3;
    return 7;
  }

  const SEASON_MODIFIERS = {
    summer: { water: 0.8, fertilizer: 1.5 },
    spring: { water: 0.9, fertilizer: 1.2 },
    autumn: { water: 1.1, fertilizer: 0.7 },
    winter: { water: 1.4, fertilizer: 0.2 }
  };

  const LOCATION_MODIFIERS = {
    balcony: 0.85,
    garden: 0.9,
    indoor: 1.0,
    bathroom: 1.1,
    kitchen: 1.0
  };

  const CLIMATE_MODIFIERS = {
    hot: 0.85,
    warm: 0.9,
    moderate: 1.0,
    cool: 1.15,
    cold: 1.25
  };

  const LOCATION_TRANSLATIONS = {
    balcony: "Balkon",
    garden: "Garten",
    indoor: "Innenraum",
    bathroom: "Bad",
    kitchen: "Küche"
  };

  const CLIMATE_TRANSLATIONS = {

    warm: "Warm",

  };

  function getLocationFromRoom(room) {
    if (!room || !room.name) return "indoor";
    const name = room.name.toLowerCase();
    if (name.includes("balkon") || name.includes("terrasse")) return "balcony";
    if (name.includes("garten") || name.includes("außen")) return "garden";
    if (name.includes("bad")) return "bathroom";
    if (name.includes("küche") || name.includes("kitchen")) return "kitchen";
    return "indoor";
  }

  function determineClimate(temperature) {
    if (temperature === null || temperature === undefined) return "moderate";
    if (temperature >= 26) return "hot";
    if (temperature >= 20) return "warm";
    if (temperature >= 12) return "moderate";
    return "cold";
  }

  // Hauptfunktion für sichere Gießanpassung
  function getEnhancedWateringInterval(plant, room) {
    if (!plant || !plant.type) {
      return { interval: 7, reasons: [], baseInterval: 7, status: "standard", minDays: 2 };
    }
    
    const baseInterval = getBaseWateringInterval(plant.type);
    const season = getCurrentSeason();
    const location = getLocationFromRoom(room);
    const temperature = room?.temperature ?? null;
    const climate = determineClimate(temperature);
    
    let adjusted = baseInterval;
    let reasons = [];
    let riskWarnings = [];
    let wasAdjusted = false;
    
    // 1. Saison-Anpassung (konservativ)
    const seasonMod = SEASON_MODIFIERS[season];
    if (seasonMod) {
      adjusted *= seasonMod.water;
      wasAdjusted = true;
      reasons.push(`${getSeasonName(season)}: ${seasonMod.water > 1 ? '+' : ''}${Math.round((seasonMod.water - 1) * 100)}%`);
    }
    
    // 2. Standort-Anpassung
    const locMod = LOCATION_MODIFIERS[location];
    if (locMod) {
      adjusted *= locMod;
      wasAdjusted = true;
      reasons.push(`Standort: ${LOCATION_TRANSLATIONS[location] || location}`);
    }
    
    // 3. Klima-Anpassung
    const climateMod = CLIMATE_MODIFIERS[climate];
    if (climateMod) {
      adjusted *= climateMod;
      wasAdjusted = true;
      reasons.push(`Klima: ${CLIMATE_TRANSLATIONS[climate] || climate}`);
    }
    
    // 4. SICHERHEITS-BESCHRÄNKUNGEN
    const cat = getPlantCategory(plant.type);
    
    // Sukkulenten: Mindestens 7 Tage
    if (cat === "succulent") {
      adjusted = Math.max(7, adjusted);
      if (baseInterval * 0.7 > adjusted) {
        reasons.push("Min 7 Tage (Sukkulente)");
      }
    }
    
    // Gesamt-Reduktion max 30%
    const maxReduction = baseInterval * 0.7;
    if (adjusted < maxReduction) {
      adjusted = maxReduction;
      reasons.push("Sicherheits-Begrenzung: max -30%");
    }
    
    // Mindestens 2-3 Tage
    const minInterval = cat === "succulent" ? 7 : (cat === "tropical" ? 2 : 3);
    adjusted = Math.max(minInterval, adjusted);
    
    // 5. Warnungen bei Risiko
    if (season === "winter" && location === "indoor" && cat !== "tropical") {
      riskWarnings.push("Winter + Innenraum: Überwässerungsrisiko");
    }
    
    if (season === "summer" && location === "balcony") {
      riskWarnings.push("Balkon Sommer: Prüfe Erde häufiger");
    }
    
    const finalInterval = Math.round(adjusted);
    
    // Status berechnen
    const daysSinceWater = daysSince(plant.last_watered_date);
    let status = "safe";
    if (daysSinceWater !== null && daysSinceWater >= Math.floor(finalInterval * 0.7)) {
      status = "ready";
    } else if (daysSinceWater !== null && daysSinceWater < Math.floor(finalInterval * 0.5)) {
      status = "too-early";
    }
    
    return {
      interval: finalInterval,
      reasons: reasons,
      baseInterval: baseInterval,
      wasAdjusted: finalInterval !== baseInterval,
      season: getSeasonName(season),
      location: location,
      climate: climate,
      status: status,
      riskWarnings: riskWarnings,
      minDays: minInterval,
      checkSoil: true
    };
  }

  // Erweiterte Dünge-Logik
  function getEnhancedFertilizerInterval(plant, room) {
    if (!plant || !plant.fertilizer_interval || plant.fertilizer_interval === 0) {
      return { interval: 0, active: false, reasons: [], seasonWarning: null };
    }
    
    const season = getCurrentSeason();
    const location = getLocationFromRoom(room);
    const baseInterval = plant.fertilizer_interval;
    let adjusted = baseInterval;
    let reasons = [];
    let seasonWarning = null;
    
    // Winter: drastisch reduzieren oder deaktivieren
    if (season === "winter") {
      adjusted = Math.max(45, baseInterval * 2);
      seasonWarning = "Winter: Düngen reduzieren";
      reasons.push("Winter - Ruhephase");
    }
    
    // Sommer: etwas mehr
    if (season === "summer") {
      adjusted = Math.max(7, Math.floor(baseInterval * 0.8));
      reasons.push("Sommer - Wachstumsphase");
    }
    
    // Balkon im Sommer: etwas mehr
    if (location === "balcony" && season === "summer") {
      adjusted = Math.max(7, Math.floor(adjusted * 0.9));
      reasons.push("Balkon im Sommer");
    }
    
    return {
      interval: Math.round(adjusted),
      active: season !== "winter" || adjusted <= 60,
      reasons: reasons,
      baseInterval: baseInterval,
      season: getSeasonName(season),
      seasonWarning: seasonWarning
    };
  }

  function needsWaterAdaptive(plant, rooms) {
    if (!plant || !plant.type) return false;
    if (!plant.room_id || !rooms || rooms.length === 0) return needsWater(plant);
    const room = rooms.find(r => r && r.id === plant.room_id);
    if (!room) return needsWater(plant);
    const adaptive = getEnhancedWateringInterval(plant, room, plant.watering_interval);
    const d = daysSince(plant.last_watered_date);
    if (d === null) return true;
    return d >= adaptive.interval;
  }

  function daysUntilAdaptive(plant, rooms) {
    if (!plant || !plant.type) return 0;
    if (!plant.room_id || !rooms || rooms.length === 0) return daysUntil(plant);
    const room = rooms.find(r => r && r.id === plant.room_id);
    if (!room) return daysUntil(plant);
    const adaptive = getEnhancedWateringInterval(plant, room, plant.watering_interval);
    const d = daysSince(plant.last_watered_date);
    if (d === null) return 0;
    return Math.max(0, adaptive.interval - d);
  }

  // ── DiscoverView – Cache (localStorage, 24h TTL) ──────────
  const DISCOVER_CACHE_KEY = 'pflanzen_discover_v1';
  const DISCOVER_CACHE_TTL = TTL_DISCOVER_HOURS * 60 * 60 * 1000;

  function getCachedDiscoverData(categoryId) {
    try {
      const raw = localStorage.getItem(DISCOVER_CACHE_KEY);
      if (!raw) return null;
      const cache = JSON.parse(raw);
      const entry = cache[categoryId];
      if (entry && (Date.now() - entry.ts) < DISCOVER_CACHE_TTL) {
        return entry.data;
      }
    } catch(e) {}
    return null;
  }

  function setCachedDiscoverData(categoryId, data) {
    try {
      const raw = localStorage.getItem(DISCOVER_CACHE_KEY);
      const cache = raw ? JSON.parse(raw) : {};
      cache[categoryId] = { data, ts: Date.now() };
      localStorage.setItem(DISCOVER_CACHE_KEY, JSON.stringify(cache));
    } catch(e) {}
  }

  // ── DiscoverView ─────────────────────────────────────────
  function DiscoverView() {
    const categories = [
      { id: "sun", icon: "🌞", label: "Viel Sonne (Outdoor)", prompt: "Pflanzen die viel direktes Sonnenlicht brauchen und für den Garten oder Balkon geeignet sind" },
      { id: "sleep", icon: "🌙", label: "Schlafqualität", prompt: "Pflanzen die die Schlafqualität verbessern und beruhigend wirken" },
      { id: "easy", icon: "🌱", label: "Pflegeleicht", prompt: "Sehr pflegeleichte Zimmerpflanzen für Anfänger" },
      { id: "air", icon: "🌬️", label: "Luftreinigend", prompt: "Pflanzen die die Luftqualität verbessern und Schadstoffe filtern" },
    ];
    
    const [activeCategory, setActiveCategory] = useState(null);
    const [recommendations, setRecommendations] = useState(null);
    const [loading, setLoading] = useState(false);
    const [fromCache, setFromCache] = useState(false);

    const fetchRecommendations = async (category) => {
      // Toggle: gleiche Kategorie nochmal klicken schließt sie
      if (activeCategory === category && recommendations) {
        setActiveCategory(null);
        setRecommendations(null);
        setFromCache(false);
        return;
      }
      // Doppelklick-Schutz
      if (loading) return;

      setActiveCategory(category);
      setFromCache(false);

      // 1. Cache prüfen (24h)
      const cached = getCachedDiscoverData(category);
      if (cached) {
        console.log(`[Discover Cache] Treffer für "${category}"`);
        setRecommendations(cached);
        setFromCache(true);
        return;
      }

      setLoading(true);
      
      try {
        const apiKey = getApiKey();
        if (!apiKey) {
          setRecommendations({ error: "Kein API-Key konfiguriert. Bitte in Einstellungen eintragen." });
          setLoading(false);
          return;
        }
        
        const cat = categories.find(c => c.id === category);
        const safePrompt = sanitizeInput(cat.prompt);
        const prompt = `Gib mir 5-6 Empfehlungen für ${safePrompt}. Antworte als JSON-Array mit diesem Format:
[
  { "name": "Pflanzenname", "reason": "Kurze Begründung warum diese Pflanze", "care": "Pflegetipp" }
]
Nur JSON, keine Erklärungen.`;
        
        let response;
        try {
          response = await fetchWithTimeout("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
              "Authorization": `Bearer ${apiKey}`,
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              model: GROQ_MODEL,
              messages: [{ role: "user", content: prompt }],
              temperature: 0.3,
              max_tokens: 800
            })
          }, 15000);
        } catch (e) {
          if (e.name === 'AbortError') {
            setRecommendations({ error: "Zeitüberschreitung. Bitte erneut versuchen." });
            setLoading(false);
            return;
          }
          throw e;
        }
        
        if (response.status === 429) {
          setRecommendations({ error: "Zu viele Anfragen. Bitte kurz warten und erneut versuchen." });
          setLoading(false);
          return;
        }
        if (response.status === 401) {
          setRecommendations({ error: "Ungültiger API-Key. Bitte in Einstellungen prüfen." });
          setLoading(false);
          return;
        }

        if (response.ok) {
          const data = await response.json();
          if (!data.choices || !data.choices[0]) {
            setRecommendations({ error: "Ungültige Antwort vom Server" });
          } else {
            const content = data.choices[0].message.content;
            const jsonMatch = content.match(/\[[\s\S]*\]/);
            if (jsonMatch) {
              try {
                const parsed = JSON.parse(jsonMatch[0]);
                if (Array.isArray(parsed) && parsed.length > 0) {
                  // Im Cache speichern
                  setCachedDiscoverData(category, parsed);
                  setRecommendations(parsed);
                } else {
                  setRecommendations({ error: "Keine Ergebnisse gefunden" });
                }
              } catch(parseErr) {
                setRecommendations({ error: "Fehler beim Verarbeiten der Antwort" });
              }
            } else {
              setRecommendations({ error: "Keine Ergebnisse gefunden" });
            }
          }
        } else {
          setRecommendations({ error: `Server-Fehler (${response.status})` });
        }
      } catch (e) {
        setRecommendations({ error: "Verbindungsfehler. Bitte erneut versuchen." });
      }
      
      setLoading(false);
    };

    return React.createElement('div', { style: { padding: `calc(52px + env(safe-area-inset-top,0px)) 20px 20px`, maxWidth: 430, margin: "0 auto", paddingBottom: "calc(90px + env(safe-area-inset-bottom, 0px))" } },
      React.createElement('p', { style: { fontSize: 14, color: C.muted, marginBottom: 24 } }, "Finde die perfekte Pflanze für dich"),
      
      // Categories
      React.createElement('div', { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 24 } },
        categories.map(cat =>
          React.createElement('div', {
            key: cat.id,
            onClick: () => fetchRecommendations(cat.id),
            style: {
              background: activeCategory === cat.id ? C.accent : C.card,
              border: `1px solid ${activeCategory === cat.id ? C.accent : C.border}`,
              borderRadius: 16,

  const GROQ_MODEL = "llama-3.1-8b-instant";
  const STORAGE_KEY_API = "pflanzen_groq_api_key";
  
  function getApiKey() {
    try { return localStorage.getItem(STORAGE_KEY_API) || ""; } catch { return ""; }
  }
  function setApiKey(key) {
    try { localStorage.setItem(STORAGE_KEY_API, key); } catch {}

  // ══════════════════════════════════════════════════════════════════
  // GROQ API – VERBESSERTE INTEGRATION v2
  // Ziel: Pflanzensezifische, kontextabhängige, validierte KI-Antworten
  // ══════════════════════════════════════════════════════════════════

  // Input Sanitization - verhindert XSS und Injection
  function sanitizeInput(str) {
    if (typeof str !== 'string') return '';
    return str
      .replace(/[<>]/g, '')
      .replace(/[\u0000-\u001F\u007F]/g, '')
      .trim()
      .slice(0, 200);
  }

  // Timeout-Wrapper für API-Calls
  function fetchWithTimeout(url, options, timeoutMs = 18000) {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), timeoutMs);
    return fetch(url, { ...options, signal: controller.signal })
      .finally(() => clearTimeout(timeout));
  }

  // ── Persistenter Pflanzen-Daten-Cache (localStorage, 7 Tage TTL) ─────────
  const PLANT_AI_CACHE_KEY = 'pflanzen_ai_data_v2';
  const PLANT_AI_CACHE_TTL = TTL_AI_DAYS * MS_PER_DAY;
  const PLANT_AI_CACHE_MAX = MAX_CACHE_AI;

  function _getAiCacheKey(name, season) {
    return `${normalizeInput(name)}_${season}`;
  }

  function getCachedPlantAiData(name, season) {
    try {
      const raw = localStorage.getItem(PLANT_AI_CACHE_KEY);
      if (!raw) return null;
      const cache = JSON.parse(raw);
      const entry = cache[_getAiCacheKey(name, season)];
      if (entry && (Date.now() - entry.ts) < PLANT_AI_CACHE_TTL) {
        return { ...entry.data, _fromCache: true };
      }
    } catch(e) {}
    return null;
  }

  function setCachedPlantAiData(name, season, data) {
    try {
      const raw = localStorage.getItem(PLANT_AI_CACHE_KEY);
      const cache = raw ? JSON.parse(raw) : {};
      const key = _getAiCacheKey(name, season);
      cache[key] = { data, ts: Date.now() };
      // Cache-Größe begrenzen: älteste Einträge löschen
      const keys = Object.keys(cache);
      if (keys.length > PLANT_AI_CACHE_MAX) {
        keys.sort((a, b) => (cache[a].ts || 0) - (cache[b].ts || 0))
            .slice(0, keys.length - PLANT_AI_CACHE_MAX)
            .forEach(k => delete cache[k]);
      }
      localStorage.setItem(PLANT_AI_CACHE_KEY, JSON.stringify(cache));
    } catch(e) {}
  }

Regeln:

  // ── Response-Validator: prüft Vollständigkeit und Plausibilität ──────────
  function validateGroqResponse(parsed, plantName) {
    const errors = [];

    // Pflichtfelder prüfen
    const required = ['name', 'watering_days', 'water', 'fertilizer_interval', 'light', 'humidity', 'temperature'];
    for (const field of required) {
      if (parsed[field] === undefined || parsed[field] === null || parsed[field] === '') {
        errors.push(`Fehlendes Pflichtfeld: ${field}`);
      }
    }

    // watering_days: muss Integer 1-90 sein
    const wd = parseInt(parsed.watering_days);
    if (isNaN(wd) || wd < 1 || wd > 90) {
      errors.push(`Ungültiger watering_days-Wert: ${parsed.watering_days} (erwartet: 1–90)`);
    }

    // fertilizer_interval: muss Integer 0-90 sein
    const fi = parseInt(parsed.fertilizer_interval);
    if (isNaN(fi) || fi < 0 || fi > 90) {
      errors.push(`Ungültiger fertilizer_interval-Wert: ${parsed.fertilizer_interval} (erwartet: 0–90)`);
    }

    // water-Text: muss Zahl enthalten und nicht vage sein
    if (typeof parsed.water === 'string') {
      const hasNumber = /\d/.test(parsed.water);
      const isVague = /^(nach Bedarf|gelegentlich|selten|je nach)$/i.test(parsed.water.trim());
      if (!hasNumber || isVague) {
        errors.push(`Vager water-Text ohne Intervallzahl: "${parsed.water}"`);
      }
      if (parsed.water.length < 8) {
        errors.push(`water-Text zu kurz: "${parsed.water}"`);
      }
    }

    // Strings-Mindestlänge
    if (typeof parsed.light === 'string' && parsed.light.length < 4)
      errors.push(`light zu kurz: "${parsed.light}"`);
    if (typeof parsed.temperature === 'string' && parsed.temperature.length < 3)
      errors.push(`temperature zu kurz: "${parsed.temperature}"`);

    return {
      valid: errors.length === 0,
      errors,
      warnings: errors.length > 0 && errors.length <= 2 ? errors : []
    };
  }

  // ── Response-Normalisierer: rohe Groq-Antwort → internes Format ─────────
  function normalizeGroqResponse(parsed, plantName, season) {
    // watering_days aus Text extrahieren, falls Feld fehlt
    let wateringDays = parseInt(parsed.watering_days);
    if (isNaN(wateringDays) || wateringDays < 1) {
      const match = (parsed.water || '').match(/\d+/);
      wateringDays = match ? parseInt(match[0]) : null;
    }

    // Fertilizer aus PLANT_DB ergänzen, falls Groq 0 zurückgibt und Pflanze bekannt
    let fertInt = parseInt(parsed.fertilizer_interval);
    if (isNaN(fertInt) || fertInt < 0) fertInt = 0;
    if (fertInt === 0) {
      // Groq sagt "kein Dünger" – PLANT_DB als Plausibilitätsprüfung
      const dbMatch = matchPlant(plantName);
      const dbInfo = dbMatch ? PLANT_DB[dbMatch.type] : null;
      // Sukkulenten und Kakteen wirklich kein/wenig Dünger – OK
      const cat = getPlantCategory(dbMatch?.type || 'Andere');
      if (cat !== 'succulent' && cat !== 'other') {
        // Für andere Kategorien CATEGORY_DEFAULTS-Wert nutzen
        const catDef = CATEGORY_DEFAULTS[cat] || CATEGORY_DEFAULTS['unknown'];
        if (catDef.fertilizer) fertInt = catDef.fertilizer;
      }
    }

    // Dünger-Text aus fertilizer_type oder fertilizer
    const fertText = parsed.fertilizer_type || parsed.fertilizer || '';

    return {
      // Rohdaten der KI (für Anzeige)
      name:               parsed.name || plantName,
      watering_days:      wateringDays,
      water:              parsed.water || (wateringDays ? `Alle ${wateringDays} Tage gießen` : null),
      fertilizer_interval: fertInt,
      fertilizer_type:    fertText,
      light:              parsed.light || "Hell, indirekt",
      humidity:           parsed.humidity || "Mittel",
      temperature:        parsed.temperature || "18–25°C",
      notes:              parsed.notes || "",
      // Neue Felder: Beschreibung, Herkunft, Pflegetipp
      description:        (parsed.description && parsed.description.length > 10) ? parsed.description : null,
      origin:             (parsed.origin     && parsed.origin.length > 4)        ? parsed.origin     : null,
      tip:                (parsed.tip        && parsed.tip.length > 10)          ? parsed.tip        : null,
      // Für aiData-Display-Felder
      fertilizer:         fertText || (fertInt > 0 ? `Alle ${fertInt} Tage düngen` : "Kein Dünger nötig"),
      season:             season,
      _source:            'groq',
      _enriched:          !!(parsed.description && parsed.origin && parsed.tip)
    };
  }

  // ── Partieller Repair: ergänzt fehlende Felder aus PLANT_DB ─────────────
  function repairPartialResponse(parsed, plantName) {
    const dbMatch = matchPlant(plantName);
    const dbInfo = dbMatch ? (PLANT_DB[dbMatch.type] || PLANT_DB["Andere"]) : PLANT_DB["Andere"];
    const cat = getPlantCategory(dbMatch?.type || 'Andere');
    const catDef = CATEGORY_DEFAULTS[cat] || CATEGORY_DEFAULTS['unknown'];

    const repaired = { ...parsed };

    // watering_days: aus water-Text oder PLANT_DB
    if (!parseInt(repaired.watering_days) || parseInt(repaired.watering_days) < 1) {
      const fromText = (repaired.water || '').match(/\d+/);
      repaired.watering_days = fromText
        ? parseInt(fromText[0])
        : (dbInfo.watering_interval || catDef.watering || 7);
    }

    // fertilizer_interval: aus PLANT_DB
    if (isNaN(parseInt(repaired.fertilizer_interval))) {
      repaired.fertilizer_interval = catDef.fertilizer || 21;
    }

    // Textfelder aus PLANT_DB ergänzen
    if (!repaired.water || repaired.water.length < 8) {
      repaired.water = `Alle ${repaired.watering_days} Tage gießen – ${dbInfo.tip || 'Erde auf Feuchtigkeit prüfen'}`;
    }
    if (!repaired.light || repaired.light.length < 4) repaired.light = dbInfo.light || catDef.light || "Hell, indirekt";
    if (!repaired.humidity || repaired.humidity.length < 2) repaired.humidity = dbInfo.humidity || catDef.humidity || "Mittel";
    if (!repaired.temperature || repaired.temperature.length < 2) repaired.temperature = "18–25°C";
    if (!repaired.notes) repaired.notes = dbInfo.tip || "";
    // Neue Felder aus PLANT_DB (als Fallback)
    if (!repaired.description && dbInfo.description) repaired.description = dbInfo.description;
    if (!repaired.origin && dbInfo.origin) repaired.origin = dbInfo.origin;
    if (!repaired.tip && dbInfo.tip) repaired.tip = dbInfo.tip;

    repaired._repaired = true;
    return repaired;
  }

  // ── Haupt-API-Funktion mit verbesserter Logik ─────────────────────────────
  async function fetchPlantData(plantName, roomContext = null) {
    const apiKey = getApiKey();
    if (!apiKey) throw new Error("Kein API-Key konfiguriert. Bitte in Einstellungen eintragen.");

    const safeName = sanitizeInput(plantName);
    if (!safeName || safeName.length < 2) throw new Error("Ungültiger Pflanzenname.");

    const month = new Date().getMonth() + 1;
    const season = month >= 3 && month <= 5 ? "Frühling"
                 : month >= 6 && month <= 8 ? "Sommer"
                 : month >= 9 && month <= 11 ? "Herbst" : "Winter";

    // 1. Cache prüfen (persistent, 7 Tage)
    const cached = getCachedPlantAiData(safeName, season);
    if (cached) {
      console.log(`[Groq Cache] Treffer für "${safeName}" (${season})`);
      return cached;
    }

    // 2. API-Call mit erweitertem Prompt
    const MAX_RETRIES = 3;
    let lastError = null;
    let useFallbackPrompt = false;

    for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
      try {
        const messages = useFallbackPrompt
          ? [{ role: "user", content:
              `JSON-Pflegedaten für "${safeName}" (${season}). ` +
              `Nur JSON: {"name":"${safeName}","watering_days":7,"water":"Alle 7 Tage gießen","fertilizer_interval":14,` +
              `"fertilizer_type":"Standarddünger","light":"Hell, indirekt","humidity":"Mittel","temperature":"18-25°C","notes":""}`
            }]
          : buildGroqMessages(safeName, season, roomContext);

        const response = await fetchWithTimeout("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${apiKey}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: GROQ_MODEL,
            messages,
            temperature: 0.15,       // Niedrig → deterministische, präzise Werte
            max_tokens: 600,
            stop: ["\n\n\n"]         // Verhindert langes Droning
          })
        }, 18000);

        // Rate-Limit: exponentielles Backoff
        if (response.status === 429) {
          const wait = 2500 * Math.pow(2, attempt);
          console.warn(`[Groq] Rate-Limit (429), warte ${wait}ms…`);
          await new Promise(r => setTimeout(r, wait));
          continue;
        }

        if (response.status === 401) throw new Error("Ungültiger API-Key. Bitte in Einstellungen prüfen.");
        if (response.status === 503) {
          await new Promise(r => setTimeout(r, 3000));
          continue;
        }
        if (!response.ok) throw new Error(`Groq API-Fehler: HTTP ${response.status}`);

        const data = await response.json();
        if (!data.choices?.[0]?.message?.content) throw new Error("Leere API-Antwort erhalten.");

        const raw = data.choices[0].message.content.trim();

        // JSON extrahieren (tolerant gegenüber Markdown-Blöcken)
        const jsonMatch = raw.match(/\{[\s\S]*?\}/);
        if (!jsonMatch) {
          console.warn(`[Groq] Kein JSON in Antwort (Versuch ${attempt+1}):`, raw.slice(0, 100));
          useFallbackPrompt = true; // Nächster Versuch mit vereinfachtem Prompt
          lastError = new Error("Kein JSON in API-Antwort gefunden.");
          continue;
        }

        let parsed;
        try {
          parsed = JSON.parse(jsonMatch[0]);
        } catch(jsonErr) {
          console.warn(`[Groq] JSON-Parse-Fehler (Versuch ${attempt+1}):`, jsonErr.message);
          useFallbackPrompt = true;
          lastError = new Error("API-Antwort konnte nicht geparst werden.");
          continue;
        }

        // Validierung
        const validation = validateGroqResponse(parsed, safeName);
        
        if (!validation.valid) {
          console.warn(`[Groq] Validierungsfehler (Versuch ${attempt+1}):`, validation.errors);
          
          // Bei 1-2 reparierbaren Fehlern: Repair statt Retry
          if (validation.errors.length <= 3) {
            console.info('[Groq] Versuche partielle Reparatur…');
            parsed = repairPartialResponse(parsed, safeName);
            const recheck = validateGroqResponse(parsed, safeName);
            if (!recheck.valid && !useFallbackPrompt) {
              useFallbackPrompt = true;
              lastError = new Error(`Validierung fehlgeschlagen: ${validation.errors[0]}`);
              continue;
            }
          } else {
            useFallbackPrompt = true;
            lastError = new Error(`Validierung fehlgeschlagen: ${validation.errors.join('; ')}`);
            continue;
          }
        }

        // Normalisieren
        const normalized = normalizeGroqResponse(parsed, safeName, season);
        
        // In persistenten Cache speichern
        setCachedPlantAiData(safeName, season, normalized);
        console.info(`[Groq] ✅ Erfolgreich: "${safeName}" – Gießen: alle ${normalized.watering_days}d, Dünger: alle ${normalized.fertilizer_interval}d`);
        
        return normalized;

      } catch(e) {
        if (e.name === 'AbortError') throw new Error("Zeitüberschreitung (18s). Bitte Internetverbindung prüfen.");
        if (e.message.includes('Ungültiger API-Key')) throw e; // nicht retryable
        lastError = e;
        console.warn(`[Groq] Versuch ${attempt+1} fehlgeschlagen:`, e.message);
        if (attempt < MAX_RETRIES - 1) {
          await new Promise(r => setTimeout(r, 1200 * (attempt + 1)));
        }
      }
    }

    // Alle Versuche fehlgeschlagen
    throw lastError || new Error("Groq API nicht erreichbar nach 3 Versuchen.");
  }

  // ══════════════════════════════════════════════════════════════════
  // ENRICH-API: Lazy-Load von Beschreibung, Herkunft, Pflegetipp
  // Wird beim Öffnen einer Pflanze ohne diese Felder ausgeführt.
  // Separater Cache (30 Tage TTL) – saisonal unabhängig.
  // ══════════════════════════════════════════════════════════════════

  const PLANT_ENRICH_CACHE_KEY = 'pflanzen_enrich_v1';
  const PLANT_ENRICH_CACHE_TTL = TTL_ENRICH_DAYS * MS_PER_DAY;

  function getCachedEnrichData(plantName) {
    try {
      const raw = localStorage.getItem(PLANT_ENRICH_CACHE_KEY);
      if (!raw) return null;
      const cache = JSON.parse(raw);
      const key = normalizeInput(plantName);
      const entry = cache[key];
      if (entry && (Date.now() - entry.ts) < PLANT_ENRICH_CACHE_TTL) {
        return { ...entry.data, _fromEnrichCache: true };
      }
    } catch(e) {}
    return null;
  }

  function setCachedEnrichData(plantName, data) {
    try {
      const raw = localStorage.getItem(PLANT_ENRICH_CACHE_KEY);
      const cache = raw ? JSON.parse(raw) : {};
      cache[normalizeInput(plantName)] = { data, ts: Date.now() };
      // Max 80 Einträge
      const keys = Object.keys(cache);
      if (keys.length > 80) {
        keys.sort((a, b) => (cache[a].ts || 0) - (cache[b].ts || 0))
            .slice(0, keys.length - 80)
            .forEach(k => delete cache[k]);
      }
      localStorage.setItem(PLANT_ENRICH_CACHE_KEY, JSON.stringify(cache));
    } catch(e) {}
  }

  // Prüft ob Pflanze bereits vollständige Enrich-Daten hat
  function hasEnrichData(plant) {
    return !!(plant.aiData?.description && plant.aiData?.origin && plant.aiData?.tip);
  }

  // Validiert Enrich-Response auf Mindestqualität
  function validateEnrichResponse(parsed) {
    const errors = [];
    if (!parsed.description || parsed.description.length < 15)
      errors.push('description zu kurz oder fehlend');
    if (!parsed.origin || parsed.origin.length < 5)
      errors.push('origin zu kurz oder fehlend');
    if (!parsed.tip || parsed.tip.length < 15)
      errors.push('tip zu kurz oder fehlend');
    // Qualitätsprüfung: keine offensichtlich falschen Antworten
    const genericPhrases = ['pflanze ist eine pflanze', 'unknown', 'keine information'];
    for (const field of ['description', 'origin', 'tip']) {
      if (parsed[field] && genericPhrases.some(p => parsed[field].toLowerCase().includes(p))) {
        errors.push(`${field} enthält generische Aussage`);
      }
    }
    return { valid: errors.length === 0, errors };
  }

  async function fetchPlantEnrichData(plantName) {
    const safeName = sanitizeInput(plantName);
    if (!safeName || safeName.length < 2) throw new Error("Ungültiger Pflanzenname.");

    // 1. Enrich-Cache prüfen (30 Tage)
    const cached = getCachedEnrichData(safeName);
    if (cached) {
      console.log(`[Enrich Cache] Treffer für "${safeName}"`);
      return cached;
    }

    // 2. PLANT_DB als sofortiger Fallback
    const dbMatch = matchPlant(safeName);
    const dbInfo = dbMatch ? (PLANT_DB[dbMatch.type] || PLANT_DB["Andere"]) : PLANT_DB["Andere"];
    const dbFallback = {
      description: dbInfo.description || null,
      origin:      dbInfo.origin      || null,
      tip:         dbInfo.tip         || null,
      _source:     'plant_db'
    };

    const apiKey = getApiKey();
    if (!apiKey) {
      // Kein API-Key: PLANT_DB-Fallback cachen und zurückgeben (kein Fehler, kein erneuter Aufruf)
      setCachedEnrichData(safeName, dbFallback);
      return dbFallback;
    }

    // 3. Groq-Anfrage für Enrich-Daten
    const systemPrompt = `Du bist ein präziser Pflanzenexperte. Antworte AUSSCHLIESSLICH mit validem JSON, kein Markdown.`;
    const exampleJson = `{"description":"Beliebte Zimmerpflanze mit markanten, eingeschnittenen Blättern. Wächst schnell und ist pflegeleicht.","origin":"Tropische Regenwälder Zentral- und Südamerikas (Mexiko bis Kolumbien)","tip":"Staunässe unbedingt vermeiden – Finger-Test vor dem Gießen. Im Sommer monatlich Blätter abstauben."}`;
    
    const userPrompt = `Erstelle folgende Informationen für die Pflanze "${safeName}" als JSON:

Beispiel (Monstera):
${exampleJson}

Regeln:
- description: 1–2 prägnante, informative Sätze zur Pflanze (Aussehen, Besonderheiten)
- origin: genaue Herkunftsregion mit Klimaangabe, z.B. "Tropische Bergwälder Äthiopiens"
- tip: 1–2 Sätze mit dem wichtigsten konkreten Pflegehinweis für Hobbyisten
- Keine vagen, generischen oder falschen Aussagen

Antworte NUR mit dem JSON für "${safeName}":`;

    const MAX_RETRIES = 2;
    let lastErr = null;

    for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
      try {
        const response = await fetchWithTimeout("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${apiKey}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: GROQ_MODEL,
            messages: [
              { role: "system", content: systemPrompt },
              { role: "user",   content: userPrompt }
            ],
            temperature: 0.2,
            max_tokens: 350
          })
        }, 15000);

        if (response.status === 429) {
          await new Promise(r => setTimeout(r, 3000 * (attempt + 1)));
          continue;
        }
        if (response.status === 401) throw new Error("Ungültiger API-Key.");
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        const raw = data.choices?.[0]?.message?.content?.trim() || '';
        const jsonMatch = raw.match(/\{[\s\S]*?\}/);
        if (!jsonMatch) { lastErr = new Error("Kein JSON in Enrich-Antwort"); continue; }

        let parsed;
        try { parsed = JSON.parse(jsonMatch[0]); }
        catch(e) { lastErr = new Error("JSON-Parse-Fehler"); continue; }

        // Validierung
        const validation = validateEnrichResponse(parsed);
        if (!validation.valid) {
          console.warn(`[Enrich] Validierungsfehler:`, validation.errors);
          // Partiell nutzen: mindestens ein sinnvolles Feld
          const hasAny = ['description','origin','tip'].some(f => parsed[f] && parsed[f].length > 10);
          if (!hasAny) { lastErr = new Error("Enrich-Antwort qualitativ unzureichend"); continue; }
        }

        // Merge mit PLANT_DB-Fallback für fehlende Felder
        const result = {
          description: (parsed.description?.length > 10) ? parsed.description : dbFallback.description,
          origin:      (parsed.origin?.length > 4)       ? parsed.origin      : dbFallback.origin,
          tip:         (parsed.tip?.length > 10)         ? parsed.tip         : dbFallback.tip,
          _source:     'groq',
          _enriched:   true
        };

        // Im Enrich-Cache speichern
        setCachedEnrichData(safeName, result);
        console.info(`[Enrich] ✅ "${safeName}": description=${!!result.description}, origin=${!!result.origin}, tip=${!!result.tip}`);
        return result;

      } catch(e) {
        if (e.name === 'AbortError') { lastErr = new Error("Enrich-Timeout"); break; }
        lastErr = e;
        if (attempt < MAX_RETRIES - 1) await new Promise(r => setTimeout(r, 1500));
      }
    }

    // Fallback: PLANT_DB-Daten zurückgeben (kein Fehler nach außen)
    console.warn(`[Enrich] Fallback auf PLANT_DB für "${safeName}":`, lastErr?.message);
    return dbFallback;
  }

  // ── AddPlant ───────────────────────────────────────────
  function AddPlant({ onAdd, onBack, existingPlants = [], rooms = [] }) {
    const [name, setName] = useState("");
    const [customName, setCustomName] = useState("");
    const [type, setType] = useState("Monstera");
    const [notes, setNotes] = useState("");
    const [alreadyWatered, setAlreadyWatered] = useState(true);
    const [fertilizerEnabled, setFertilizerEnabled] = useState(false);
    const [fertilizerInterval, setFertilizerInterval] = useState(14);
    const [fertilizerType, setFertilizerType] = useState("");
    const [roomId, setRoomId] = useState("");
    const [isLoading, setIsLoading] = useState(false);
    const [error, setError] = useState(null);
    const [matchInfo, setMatchInfo] = useState(null);

    const submit = async () => {
      if (!name.trim()) return;
      setError(null);
      setMatchInfo(null);
      setIsLoading(true);

      try {
        // Raum-Kontext für besseren Prompt aufbauen
        const selectedRoom = rooms.find(r => r.id === roomId);
        let roomContext = null;
        if (selectedRoom) {
          const parts = [`Raum: ${selectedRoom.name}`];
          if (selectedRoom.temperature) parts.push(`Temperatur: ${selectedRoom.temperature}°C`);
          if (selectedRoom.humidity)    parts.push(`Luftfeuchtigkeit: ${selectedRoom.humidity}%`);
          roomContext = parts.join(', ');
        }

        // API-Call mit Kontext
        const aiData = await fetchPlantData(name.trim(), roomContext);
        
        // Plant-Type matching
        const matchResult = findMatchingTypeWithFallback(aiData.name || name.trim());
        
        // watering_days direkt aus normalisierter Antwort – kein Regex-Parsen mehr nötig
        let wateringInterval = aiData.watering_days
          ? Math.max(1, Math.min(90, parseInt(aiData.watering_days)))
          : parseInt((aiData.water || '').match(/\d+/)?.[0] || '7');
        if (isNaN(wateringInterval) || wateringInterval <= 0) wateringInterval = 7;

        const aiFertilizerInterval = parseInt(aiData.fertilizer_interval) || 0;

        // aiData für Anzeige (Display-Felder) zusammenbauen
        let plantAiData = {
          light:       aiData.light       || "Hell, indirekt",
          water:       aiData.water       || `Alle ${wateringInterval} Tage gießen`,
          humidity:    aiData.humidity    || "Mittel",
          temperature: aiData.temperature || "18–25°C",
          fertilizer:  aiData.fertilizer  || aiData.fertilizer_type || "Standard Dünger",
          notes:       aiData.notes       || "",
          _source:     aiData._source     || 'groq',
          _repaired:   aiData._repaired   || false,
          _fromCache:  aiData._fromCache  || false
        };

        // Bei Fallback-Match: aiData mit Kategorie-Daten anreichern
        if (matchResult.fallback && matchResult.fallbackData) {
          setMatchInfo({
            fallback: true,
            message: matchResult.fallbackData.notes,
            category: matchResult.fallbackData.category
          });
          // Nur leere Felder mit Fallback auffüllen – KI-Werte haben Priorität
          plantAiData = {
            ...matchResult.fallbackData,
            ...Object.fromEntries(Object.entries(plantAiData).filter(([,v]) => v && v !== ''))
          };
          // Synchronisiere wateringInterval wenn KI keinen sinnvollen Wert hatte
          if (!aiData.watering_days) {
            const fbMatch = matchResult.fallbackData.water?.match(/\d+/);
            if (fbMatch) wateringInterval = parseInt(fbMatch[0]) || wateringInterval;
          }
        } else {
          const confidence = Math.round((matchResult.confidence || 0.9) * 100);
          const fromCache = aiData._fromCache ? ' (gecacht)' : '';
          const repaired = aiData._repaired ? ' ⚠️ repariert' : '';
          setMatchInfo({ fallback: false, confidence, fromCache, repaired });
        }

        const newPlant = {
          id: Date.now().toString(),
          name: aiData.name || name.trim(),
          custom_name: customName.trim() || null,
          type: matchResult.type,
          matchConfidence: matchResult.confidence,
          matchStrategy: matchResult.strategy,
          isFallback: matchResult.fallback || false,
          notes: notes,
          last_watered_date: alreadyWatered ? new Date().toISOString() : null,
          aiData: plantAiData,
          watering_interval: wateringInterval,
          fertilizer_interval: fertilizerEnabled
            ? fertilizerInterval
            : (aiFertilizerInterval > 0 ? aiFertilizerInterval : 0),
          fertilizer_type: fertilizerEnabled
            ? fertilizerType
            : (aiData.fertilizer_type || aiData.fertilizer || ""),
          last_fertilized_date: (fertilizerEnabled || aiFertilizerInterval > 0)
            ? new Date().toISOString()
            : null,
          room_id: roomId || null
        };
        onAdd(newPlant);

      } catch(e) {
        // ── Echter Fallback: nur bei API-Fehler ─────────────────────────────
        console.error('[Groq Fallback] API nicht verfügbar:', e.message);
        const matchResult = findMatchingTypeWithFallback(name.trim());
        const fallbackData = matchResult.fallbackData || getFallbackData(name.trim(), { type: 'unknown' });

        // Klare Fehlermeldung anzeigen
        const isKeyError = e.message.includes('API-Key');
        setError(isKeyError
          ? e.message
          : `KI nicht erreichbar (${e.message}). Pflanze wurde mit Standardwerten gespeichert.`
        );

        if (isKeyError) { setIsLoading(false); return; } // Bei Key-Fehler nicht speichern

        setMatchInfo({
          fallback: true,
          message: fallbackData.notes,
          category: fallbackData.category,
          apiError: true,
          errorMsg: e.message
        });

        const wateringInterval = parseInt(fallbackData.water?.match(/\d+/)?.[0] || "7");

        const newPlant = {
          id: Date.now().toString(),
          name: name.trim(),
          custom_name: customName.trim() || null,
          type: matchResult.type || "Andere",
          matchConfidence: 0.1,
          matchStrategy: 'api-fallback',
          isFallback: true,
          notes: notes,
          last_watered_date: alreadyWatered ? new Date().toISOString() : null,
          aiData: {
            ...fallbackData,
            _source: 'fallback',
            _apiError: e.message
          },
          watering_interval: wateringInterval,
          fertilizer_interval: fertilizerEnabled ? fertilizerInterval : (fallbackData.fertilizer_interval || 0),
          fertilizer_type: fertilizerEnabled ? fertilizerType : (fallbackData.fertilizer_type || ""),
          last_fertilized_date: (fertilizerEnabled || (fallbackData.fertilizer_interval || 0) > 0)
            ? new Date().toISOString()
            : null,
          room_id: roomId || null
        };
        onAdd(newPlant);
      } finally {
        setIsLoading(false);
      }
    };

    const addManually = () => {
      if (!name.trim()) return;
      // BUGFIX: dbInfo mit sicherem Fallback auf "Andere" damit keine undefined-Felder entstehen
      const dbInfo = PLANT_DB[type] || PLANT_DB["Andere"];
      const wInterval = dbInfo.watering_interval || 7;
      const newPlant = {
        id: Date.now().toString(),
        name: name.trim(),
        custom_name: customName.trim() || null,
        type: type,
        notes: notes,
        last_watered_date: alreadyWatered ? new Date().toISOString() : null,
        watering_interval: wInterval,
        fertilizer_interval: fertilizerEnabled ? fertilizerInterval : 0,
        fertilizer_type: fertilizerEnabled ? fertilizerType : "",
        last_fertilized_date: fertilizerEnabled ? new Date().toISOString() : null,
        room_id: roomId || null,
        // BUGFIX: aiData für manuell hinzugefügte Pflanzen aus PLANT_DB befüllen
        aiData: {
          light: dbInfo.light || "Hell, indirekt",
          water: `Alle ${wInterval} Tage gießen`,
          humidity: dbInfo.humidity || "Mittel",
          temperature: "18-25°C",
          fertilizer: "Standard Dünger alle 14 Tage in der Wachstumsphase",
          notes: dbInfo.tip || "Beobachte deine Pflanze und passe die Pflege an."
        }
      };
      onAdd(newPlant);
    };

    const inputStyle = { width: "100%", background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "14px 16px", fontSize: 15, color: C.text, outline: "none", WebkitAppearance: "none" };

    return React.createElement('div', { style: { maxWidth: 430, margin: "0 auto", minHeight: "100vh", background: C.bg } },
      React.createElement('div', { style: { padding: `calc(52px + env(safe-area-inset-top,0px)) 20px 20px`, borderBottom: `1px solid ${C.border}` } },
        React.createElement('button', { onClick: onBack, style: { background: "none", border: "none", fontSize: 24, cursor: "pointer", marginBottom: 16, padding: 0, color: C.text } }, "←"),
        React.createElement('h1', { style: { fontFamily: "'Cormorant Garamond'", fontSize: 34, fontWeight: 500 } }, "Neue Pflanze")
      ),
      React.createElement('div', { style: { padding: "24px 20px", display: "flex", flexDirection: "column", gap: 16, paddingBottom: "calc(40px + env(safe-area-inset-bottom, 0px))" } },
        // Name with AI indicator
        React.createElement('div', null,
          React.createElement(Label, null, "Name der Pflanze"),
          React.createElement('input', { 
            value: name, 
            onChange: e => setName(e.target.value), 
            placeholder: "z.B. Monstera, Ficus, Basilikum", 
            style: inputStyle 
          })
        ),
        // Custom name (optional)
        React.createElement('div', null,
          React.createElement(Label, null, "Eigener Name (optional)"),
          React.createElement('input', { 
            value: customName, 
            onChange: e => setCustomName(e.target.value),

  // ── App ────────────────────────────────────────────────
  function App() {
    const [plants, setPlants] = useState([]);
    const [view, setView] = useState("home");
    const [selectedPlant, setSelectedPlant] = useState(null);
    const [showAdd, setShowAdd] = useState(false);
    const [loaded, setLoaded] = useState(false);
    const [rooms, setRooms] = useState(DEFAULT_ROOMS);
    const [weather, setWeather] = useState(null);

    useEffect(() => {
      const currentTheme = getTheme();
      C = currentTheme === "dark" ? C_DARK : C_LIGHT;
      if (currentTheme === "dark") {
        document.documentElement.classList.add("dark");
        document.body.classList.add("dark");
      }
    }, []);

    useEffect(() => {
      try {
        const saved = localStorage.getItem("pflanzenpflege_v1");
        if (saved) {
          const data = JSON.parse(saved);
          const migrated = data.map(p => {
            const dbInfo = PLANT_DB[p.type] || PLANT_DB["Andere"];
            const wInterval = p.watering_interval || dbInfo.watering_interval || 7;
            // BUGFIX: Stelle sicher dass aiData immer vorhanden und vollständig ist
            const migratedAiData = p.aiData && Object.keys(p.aiData).length > 0
              ? {
                  // Ergänze fehlende Felder in bestehenden aiData-Objekten
                  light: p.aiData.light || dbInfo.light || "Hell, indirekt",
                  water: p.aiData.water && !p.aiData.water.includes("undefined")
                    ? p.aiData.water
                    : `Alle ${wInterval} Tage gießen`,
                  humidity: p.aiData.humidity || dbInfo.humidity || "Mittel",
                  temperature: p.aiData.temperature || "18-25°C",
                  fertilizer: p.aiData.fertilizer || "Standard Dünger alle 14 Tage",
                  notes: p.aiData.notes || dbInfo.tip || "",
                  // Migration: description/origin/tip aus PLANT_DB als Basis-Fallback
                  description: p.aiData.description || dbInfo.description || null,
                  origin:      p.aiData.origin      || dbInfo.origin      || null,
                  tip:         p.aiData.tip          || dbInfo.tip         || null,
                  _source:     p.aiData._source      || 'migrated'
                }
              : {
                  // Keine aiData vorhanden → aus PLANT_DB befüllen
                  light:       dbInfo.light        || "Hell, indirekt",
                  water:       `Alle ${wInterval} Tage gießen`,
                  humidity:    dbInfo.humidity     || "Mittel",
                  temperature: "18-25°C",
                  fertilizer:  "Standard Dünger alle 14 Tage",
                  notes:       dbInfo.tip          || "",
                  description: dbInfo.description  || null,
                  origin:      dbInfo.origin       || null,
                  tip:         dbInfo.tip          || null,
                  _source:     'plant_db'
                };
            return {
              ...p,
              last_watered_date: p.last_watered_date || p.lastWatered || null,
              watering_interval: wInterval,
              aiData: migratedAiData
            };
          });
          setPlants(migrated);
        }
        
        let roomsToUse = DEFAULT_ROOMS;
        const savedRoomsRaw = localStorage.getItem("pflanzen_rooms");
        if (savedRoomsRaw) {
          try {
            const savedRooms = JSON.parse(savedRoomsRaw);
            if (Array.isArray(savedRooms) && savedRooms.length > 0) {
              roomsToUse = savedRooms;
            }
          } catch(e) {
            // Silent fail - use defaults
          }
        }
        setRooms(roomsToUse);
        
      } catch (e) {
        // Silent fail - use defaults
        setRooms(DEFAULT_ROOMS);
      }
      setLoaded(true);
      fetchWeather().then(w => { if(w) setWeather(w); });
    }, []);

    // ── Gieß-Erinnerungs-Logik (Notification-Skeleton) ─────
    useEffect(() => {
      if (!loaded) return;
      const thirsty = plants.filter(needsWater);
      if (thirsty.length > 0) {
        console.log("🔔 Gieß-Erinnerung:");
        thirsty.forEach(p => {
          console.log(`- ${p.name} (${p.type}) muss heute gegossen werden!`);
        });
        // Hier könnte eine Integration für Cloud Functions oder Web Push stehen.
      }
    }, [loaded, plants]);

    const save = useCallback((updated) => {
      setPlants(updated);
      try { localStorage.setItem("pflanzenpflege_v1", JSON.stringify(updated)); } catch {}
    }, []);

    const waterPlant = id => save(plants.map(p => p.id === id ? { ...p, last_watered_date: new Date().toISOString() } : p));
    const fertilizePlant = id => save(plants.map(p => p.id === id ? { ...p, last_fertilized_date: new Date().toISOString() } : p));
    const deletePlant = id => { save(plants.filter(p => p.id !== id)); setSelectedPlant(null); setView("plants"); };
    const updateCustomName = (id, customName) => save(plants.map(p => p.id === id ? { ...p, custom_name: customName || null } : p));
    // Pflanze in einen anderen Raum verschieben (alle anderen Daten bleiben unverändert)
    const moveToRoom = (id, roomId) => save(plants.map(p => p.id === id ? { ...p, room_id: roomId || null } : p));
    // Enrich-Daten (description/origin/tip) in bestehende aiData patchen und persistent speichern
    const updatePlantAiData = (id, aiDataPatch) => save(
      plants.map(p => p.id === id
        ? { ...p, aiData: { ...(p.aiData || {}), ...aiDataPatch } }
        : p
      )
    );

    if (!loaded) return React.createElement('div', { id: 'loading', style: { display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", background: C.bg } },
      React.createElement('span', { style: { fontSize: 48 } }, "🌿")
    );

    if (showAdd) return React.createElement(AddPlant, { onAdd: p => { save([...plants, p]); setShowAdd(false); }, onBack: () => setShowAdd(false), existingPlants: plants, rooms });

    if (selectedPlant) {
      const plant = plants.find(p => p.id === selectedPlant);
      if (!plant) { setSelectedPlant(null); return null; }
      const room = rooms.find(r => r.id === plant.room_id);
      return React.createElement(PlantDetail, { plant, room, rooms, onBack: () => setSelectedPlant(null), onWater: waterPlant, onFertilize: fertilizePlant, onDelete: deletePlant, onUpdateCustomName: updateCustomName, onUpdateAiData: updatePlantAiData, onMoveRoom: moveToRoom });
    }

    return React.createElement('div', { style: { maxWidth: 430, margin: "0 auto", minHeight: "100vh", background: C.bg } },
      view === "home" && React.createElement(HomeView, { plants, rooms, onWater: waterPlant, onSelect: setSelectedPlant, onAdd: () => setShowAdd(true) }),
      view === "plants" && React.createElement(PlantsView, { plants, rooms, onSelect: setSelectedPlant, onAdd: () => setShowAdd(true) }),
      view === "rooms" && React.createElement(RoomView, { 
        rooms, 
        plants, 
        weather, 
        onSelectPlant: id => { setSelectedPlant(id); setView("plants"); },
        onEditRoom: (id, data) => {
          const updated = rooms.map(r => r.id === id ? {...r, ...data} : r);
          setRooms(updated);
          try { localStorage.setItem("pflanzen_rooms", JSON.stringify(updated)); } catch {}
        },
        onAddRoom: room => {
          const updated = [...rooms, room];
          setRooms(updated);
          try { localStorage.setItem("pflanzen_rooms", JSON.stringify(updated)); } catch {}
        }
      }),
      view === "discover" && React.createElement(DiscoverView),
      view === "settings" && React.createElement(SettingsView),
      React.createElement(BottomNav, { active: view, onChange: setView, onAdd: (view === "settings" || view === "rooms" || view === "discover") ? null : () => setShowAdd(true) })
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
